# Add these locations inside the existing server block for your-own-domain.example.
# Keep /knowledge-cockpit/api/ namespaced so it does not collide with an existing /api route.

location ^~ /knowledge-cockpit/api/ {
  proxy_pass http://127.0.0.1:8088/knowledge-cockpit/api/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
  proxy_buffering off;
}

location ^~ /knowledge-cockpit/ {
  proxy_pass http://127.0.0.1:8088/knowledge-cockpit/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
}
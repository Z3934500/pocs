apiVersion: apps/v1
kind: Deployment
metadata:
  name: oee-data-platform
  labels:
    app: oee-data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oee-data-platform
  template:
    metadata:
      labels:
        app: oee-data-platform
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/oee-data-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OEE_SQLITE_PATH
              value: /app/data/warehouse/oee_platform.sqlite
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
